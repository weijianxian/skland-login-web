services:
  skland-login-web:
    env_file:
      - .env
    build:
      context: .
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
    container_name: skland-login-web
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - PORT=${PORT:-5000}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - BUILD_COMMIT=${BUILD_COMMIT:-unknown}
    volumes:
      - ./data:/app/data
